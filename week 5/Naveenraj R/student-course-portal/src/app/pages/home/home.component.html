<h1>{{ portalName }}</h1>
<p>Welcome back! Here's a quick look at where you stand this semester.</p>

<div class="stats">
  <div>Courses Available: {{ coursesAvailable }}</div>
  <div>Enrolled: {{ enrolledCount }}</div>
  <div>GPA: {{ gpa }}</div>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
<p *ngIf="message">{{ message }}</p>

<div class="search">
  <input [(ngModel)]="searchTerm" placeholder="Search courses…">
  <p>Searching for: {{ searchTerm }}</p>
</div>
